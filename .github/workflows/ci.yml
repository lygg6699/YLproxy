name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'global.json'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'global.json'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_CLI_UI_LANGUAGE: en-US
  DOTNET_NOLOGO: "true"

jobs:
  quality-gate:
    name: quality-gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Prepare 3proxy runtime
        shell: pwsh
        run: ./scripts/prepare-runtime.ps1

      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore YLproxy.sln

      - name: Generate CI workspace manifest
        shell: pwsh
        run: |
          $projectRoot = (Get-Location).Path
          $workspaceFile = Join-Path $projectRoot 'ci.code-workspace'

          $tasks = @(
              @{ label = 'YLproxy: Validate Environment'; args = @() }
              @{ label = 'YLproxy: Restore'; args = @() }
              @{ label = 'YLproxy: Build'; args = @() }
              @{ label = 'YLproxy: Build Release'; args = @() }
              @{ label = 'YLproxy: Test'; args = @() }
              @{ label = 'YLproxy: Run GUI'; args = @() }
              @{ label = 'YLproxy: Full Check'; args = @('-SkipSmokeTest') }
              @{ label = 'YLproxy: Full Check with Smoke Test'; args = @() }
              @{ label = 'YLproxy: Clean'; args = @() }
          )

          $workspace = @{
              folders = @(
                  @{ path = '.' }
              )
              settings = @{}
              tasks = @{
                  version = '2.0.0'
                  tasks = $tasks
              }
              launch = @{
                  version = '0.2.0'
                  configurations = @(
                      @{
                          name = 'YLproxy GUI (Debug)'
                          type = 'coreclr'
                          request = 'launch'
                          program = '${workspaceFolder}/src/YLproxy.GUI/bin/Debug/net10.0-windows/YLproxy.GUI.dll'
                      }
                  )
              }
          }

          $workspace | ConvertTo-Json -Depth 8 | Set-Content -LiteralPath $workspaceFile -Encoding utf8NoBOM
          Write-Host "CI workspace manifest created at $workspaceFile"

      - name: Validate workspace and runtime
        shell: pwsh
        run: ./scripts/validate-workspace.ps1 -WorkspaceFile ./ci.code-workspace

      - name: Seed isolated test data
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path data -Force | Out-Null
          Copy-Item data/config.example.json data/config.json -Force

      - name: Build Debug with warnings as errors
        shell: pwsh
        run: dotnet build YLproxy.sln --configuration Debug --no-restore -warnaserror

      - name: Build Release with warnings as errors
        shell: pwsh
        run: dotnet build YLproxy.sln --configuration Release --no-restore -warnaserror

      - name: Run unit tests
        shell: pwsh
        run: |
          $testOutput = & dotnet test tests/YLproxy.Tests.csproj `
            --configuration Debug --no-build --no-restore `
            --filter "Category=Unit" `
            --results-directory TestResults `
            --logger "trx;LogFileName=tests.trx" 2>&1
          $testOutput | Out-String | Write-Host

          $passedMatch = [regex]::Match(($testOutput -join "`n"), 'Passed:?\s*(\d+)')
          $passed = if ($passedMatch.Success) { [int]$passedMatch.Groups[1].Value } else { 0 }
          if ($passed -eq 0) {
            Write-Error "Minimum test protection: no unit tests passed (0 Passed). Ensure at least one test has [Trait(""Category"", ""Unit"")]."
            exit 1
          }
          Write-Host "Unit tests: $passed Passed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
          if-no-files-found: warn
          retention-days: 14
