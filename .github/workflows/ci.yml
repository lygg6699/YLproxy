name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'global.json'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'global.json'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_CLI_UI_LANGUAGE: en-US
  DOTNET_NOLOGO: "true"

jobs:
  quality-gate:
    name: quality-gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Prepare 3proxy runtime
        shell: pwsh
        run: ./scripts/prepare-runtime.ps1

      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore YLproxy.sln

      - name: Validate workspace and runtime
        shell: pwsh
        run: ./scripts/validate-workspace.ps1 -WorkspaceFile ./ci.code-workspace

      - name: Seed isolated test data
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path data -Force | Out-Null
          Copy-Item data/config.example.json data/config.json -Force

      - name: Build Debug with warnings as errors
        shell: pwsh
        run: dotnet build YLproxy.sln --configuration Debug --no-restore -warnaserror

      - name: Build Release with warnings as errors
        shell: pwsh
        run: dotnet build YLproxy.sln --configuration Release --no-restore -warnaserror

      - name: Run tests (excluding E2E)
        shell: pwsh
        run: |
          $testOutput = & dotnet test tests/YLproxy.Tests.csproj `
            --configuration Debug --no-build --no-restore `
            --filter "TestCategory!=E2E" `
            --results-directory TestResults `
            --logger "trx;LogFileName=tests.trx" 2>&1
          $testOutput | Out-String | Write-Host

          $passedMatch = [regex]::Match(($testOutput -join "`n"), 'Passed:?\s*(\d+)')
          $passed = if ($passedMatch.Success) { [int]$passedMatch.Groups[1].Value } else { 0 }
          $failedMatch = [regex]::Match(($testOutput -join "`n"), 'Failed:?\s*(\d+)')
          $failed = if ($failedMatch.Success) { [int]$failedMatch.Groups[1].Value } else { 0 }
          if ($failed -gt 0) {
            Write-Error "Test failures detected: $failed Failed, $passed Passed"
            exit 1
          }
          if ($passed -eq 0) {
            Write-Error "No tests passed. Ensure tests have correct TestCategory filter."
            exit 1
          }
          Write-Host "Tests: $passed Passed, 0 Failed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
          if-no-files-found: warn
          retention-days: 14

  security-check:
    name: security-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for sensitive files
        run: |
          # 检查是否有敏感文件被跟踪
          if git ls-files | grep -q "AppSettings.json"; then
            echo "Error: AppSettings.json should not be tracked"
            exit 1
          fi
          if git ls-files | grep -q "data/config.json"; then
            echo "Error: data/config.json should not be tracked"
            exit 1
          fi

      - name: Check .gitignore patterns
        run: |
          # 确保.gitignore包含必要的模式
          if ! grep -q "AppSettings.json" .gitignore; then
            echo "Error: .gitignore should include AppSettings.json"
            exit 1
          fi
          if ! grep -q "data/config.json" .gitignore; then
            echo "Error: .gitignore should include data/config.json"
            exit 1
          fi
