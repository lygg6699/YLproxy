# =============================================================================
# YLproxy Kubeconfig 模板（占位示例，不含任何真实凭据）
# =============================================================================
# 用途：当需要用 kubectl / CI 连接某个 Kubernetes 集群来部署 YLproxy 的
#       跨平台组件（例如 YLproxy.Api 容器镜像）时，复制本文件为
#       deploy/kubeconfig.yaml 并填入真实值。
#
# 重要说明：
#   * 本项目主体是 Windows WPF 桌面程序，WPF GUI 与 Windows x64 3proxy
#     无法在 Linux 容器 / k8s 中运行；k8s 仅适用于未来的跨平台服务端组件。
#   * 真实 kubeconfig 含机密（token / 客户端密钥），禁止提交到仓库。
#     deploy/kubeconfig.yaml 已在 .gitignore 中忽略；CI/CD 中请通过
#     「配置 secret」注入（例如把整份 kubeconfig 存为 secret，运行时写入
#     $HOME/.kube/config 或用 KUBECONFIG 环境变量指向）。
#   * 下方所有 REPLACE_WITH_* 均为占位符，必须替换后才可使用。
# =============================================================================

apiVersion: v1
kind: Config

clusters:
  - name: ylproxy-cluster
    cluster:
      # 集群 API Server 地址，例如 https://10.0.0.1:6443
      server: https://REPLACE_WITH_CLUSTER_API_SERVER:6443
      # 集群 CA 证书（base64）。二选一：
      #   1) 提供 CA（推荐）：填入 base64 编码的 CA 证书
      certificate-authority-data: REPLACE_WITH_BASE64_ENCODED_CA_CERT
      #   2) 跳过 TLS 校验（仅限受信任的内网/测试；生产不建议）：
      #      删除上面的 certificate-authority-data，改用下面一行
      # insecure-skip-tls-verify: true

users:
  - name: ylproxy-deployer
    user:
      # 认证方式三选一，仅保留其中一种，删除其余：
      #
      # 方式 A：ServiceAccount / Bearer Token（推荐用于 CI/CD）
      token: REPLACE_WITH_SERVICEACCOUNT_BEARER_TOKEN
      #
      # 方式 B：客户端证书
      # client-certificate-data: REPLACE_WITH_BASE64_ENCODED_CLIENT_CERT
      # client-key-data: REPLACE_WITH_BASE64_ENCODED_CLIENT_KEY
      #
      # 方式 C：exec 插件（云厂商托管集群）
      # exec:
      #   apiVersion: client.authentication.k8s.io/v1
      #   command: REPLACE_WITH_AUTH_PLUGIN   # 如 aws / gke-gcloud-auth-plugin / kubelogin
      #   args:
      #     - REPLACE_WITH_PLUGIN_ARGS
      #   # env:
      #   #   - name: REPLACE_WITH_ENV_NAME
      #   #     value: REPLACE_WITH_ENV_VALUE

contexts:
  - name: ylproxy
    context:
      cluster: ylproxy-cluster
      user: ylproxy-deployer
      # 目标命名空间，例如 ylproxy
      namespace: REPLACE_WITH_NAMESPACE

current-context: ylproxy
